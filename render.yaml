services:
  - type: web
    name: skogstad-demo
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: skogstad-demo-db
          property: connectionString

databases:
  - name: skogstad-demo-db
    plan: free
    databaseName: skogstad
    user: skogstad
